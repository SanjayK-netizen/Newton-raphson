<!DOCTYPE html>
<html>
<head>
    <title>Newton-Raphson Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Newton-Raphson Method Calculator</h1>

<div class="container">

<label>Function f(x)</label>
<input type="text" id="fx" placeholder="Example: x*x*x - x - 1">

<label>Derivative f'(x)</label>
<input type="text" id="dfx" placeholder="Example: 3*x*x - 1">

<label>Initial Guess (x0)</label>
<input type="number" id="x0">

<label>Max Iterations</label>
<input type="number" id="iter" value="10">

<label>Tolerance</label>
<input type="number" id="tol" value="0.0001" step="0.0001">

<button onclick="calculate()">Calculate Root</button>
<button onclick="reset()">Reset</button>

<h2 id="result"></h2>

<table id="table">
<tr>
<th>Iteration</th>
<th>xₙ</th>
<th>f(xₙ)</th>
<th>xₙ₊₁</th>
<th>Error</th>
</tr>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
<h1>Newton-Raphson Calculator</h1>

<button onclick="toggleTheme()">Toggle Theme</button>
<button onclick="loadExample()">Load Example</button>

<div class="progress">
<div id="progressBar"></div>
</div>

<canvas id="graph" width="400" height="200"></canvas>

<button onclick="downloadCSV()">Download Results</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
